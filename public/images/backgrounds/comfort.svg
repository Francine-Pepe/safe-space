<svg
  width="1440"
  height="900"
  viewBox="0 0 1440 900"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient
      id="background"
      x1="0"
      y1="0"
      x2="1"
      y2="1"
    >
      <stop offset="0%" stop-color="#FFF5E8"/>
      <stop offset="50%" stop-color="#FCEFE8"/>
      <stop offset="100%" stop-color="#EAF4F0"/>
    </linearGradient>

    <radialGradient
      id="glow"
      cx="0"
      cy="0"
      r="1"
    >
      <stop
        offset="0%"
        stop-color="#FFF9D9"
        stop-opacity="0.9"
      />
      <stop
        offset="100%"
        stop-color="#FFF9D9"
        stop-opacity="0"
      />
    </radialGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>


  <!-- Base -->
  <rect
    width="1440"
    height="900"
    fill="url(#background)"
  />


  <!-- Soft light -->
  <circle
    cx="300"
    cy="200"
    r="260"
    fill="url(#glow)"
    filter="url(#blur)"
  />


  <circle
    cx="1100"
    cy="700"
    r="320"
    fill="#DDEFE8"
    opacity="0.45"
    filter="url(#blur)"
  />


  <!-- Floating gentle shapes -->

  <path
    d="M150 650C250 580 340 620 390 710C430 780 330 830 220 800C110 770 80 700 150 650Z"
    fill="#F8D9D0"
    opacity="0.45"
  />


  <path
    d="M1180 120C1260 80 1340 130 1370 220C1400 310 1300 350 1210 310C1120 270 1100 160 1180 120Z"
    fill="#D8EDE5"
    opacity="0.5"
  />


  <!-- Small stars/dots -->

  <circle
    cx="480"
    cy="180"
    r="8"
    fill="#E8C9B8"
    opacity="0.7"
  />

  <circle
    cx="960"
    cy="260"
    r="6"
    fill="#D6B8A8"
    opacity="0.6"
  />

  <circle
    cx="820"
    cy="720"
    r="10"
    fill="#E8D6A8"
    opacity="0.6"
  />

</svg>